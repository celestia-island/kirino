[package]
name = "kirino-macro"
version = "0.6.0"
edition = "2021"
description = "Procedural macros for kirino — hierarchical permission derivation"
license-file = "../../LICENSE"
repository = "https://github.com/celestia-island/kirino"
rust-version = "1.75"

[lib]
proc-macro = true

[dependencies]

proc-macro2 = "^1"
quote = "^1"
syn = { version = "^2", features = ["full", "extra-traits"] }
