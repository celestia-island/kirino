[package]
name = "kirino_session"
version = "0.5.0"
edition = "2021"
rust-version = "1.75"
description = "Distributed session management with JWT and PostgreSQL for kirino"
license = "SySL-1.0"
repository = "https://github.com/celestia-island/kirino"
keywords = ["session", "jwt", "authentication", "kirino"]

[dependencies]
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
jsonwebtoken = "^9"
uuid = { version = "^1", features = ["v4", "v7", "serde"] }
chrono = { version = "^0.4", features = ["serde"] }
tokio = { version = "^1", features = ["sync", "rt"] }
tracing = { version = "^0.1" }
thiserror = "^2"
sea-orm = { version = "^1", optional = true, features = ["sqlx-postgres", "runtime-tokio-rustls"] }
zeroize = { version = "^1", features = ["zeroize_derive"] }

[features]
default = []
postgres = ["sea-orm"]

[dev-dependencies]
tokio = { version = "^1", features = ["full"] }
