name: Checks

on:
  push:
    branches: [master, dev]
  pull_request:
  workflow_call: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Clone yuuka (workspace dep)
        run: git clone --depth 1 https://github.com/celestia-island/yuuka.git ../yuuka

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check -p kirino-session -p kirino -p kirino-macro --lib

      - name: Run tests
        run: cargo test -p kirino-session -p kirino -p kirino-macro
