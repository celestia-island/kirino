name: Publish crates.io

on:
  push:
    tags: [v*]

jobs:
  checks:
    name: Checks (stage1)
    uses: ./.github/workflows/checks.yml

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [checks]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone yuuka (workspace dep)
        run: git clone --depth 1 https://github.com/celestia-island/yuuka.git ../yuuka
      - uses: Swatinem/rust-cache@v2
      - run: cargo login ${{ secrets.CRATES_IO_API_TOKEN }}
      # Publish in dependency order: macro (proc-macro dep) → session → root
      - run: cargo publish -p kirino-macro --allow-dirty --no-verify
      - run: cargo publish -p kirino-session --allow-dirty --no-verify
      - run: cargo publish -p kirino --allow-dirty --no-verify
